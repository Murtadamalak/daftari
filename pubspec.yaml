name: daftar_debt_manager
description: Debt manager and smart invoicing app for small shops.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.1.0

  # Local database (SQLite via Drift)
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.4

  # Utils
  intl: 0.20.2
  path: ^1.9.0
  uuid: ^4.5.1

  # Future features (already planned in spec)
  mobile_scanner: ^5.1.1
  flutter_local_notifications: ^20.1.0
  screenshot: ^3.0.0
  share_plus: ^10.0.0
  pdf: ^3.11.1
  google_fonts: ^6.3.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  lottie: ^3.1.2
  supabase_flutter: ^2.5.4
  confetti: ^0.7.0
  universal_io: ^2.2.2
  http: ^1.2.0
  printing: 5.14.2
  font_awesome_flutter: ^10.7.0
  file_picker: ^8.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  drift_dev: ^2.31.0
  build_runner: ^2.11.1
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/Cairo-Regular.ttf
    - assets/fonts/Cairo-Bold.ttf
