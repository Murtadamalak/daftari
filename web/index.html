<!DOCTYPE html>
<html>

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="دفتري - النظام الأذكى لإدارة مبيعاتك وديونك والحسابات التجارية.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="دفتري">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>دفتري - إدارة الديون والمبيعات</title>
  <link rel="manifest" href="manifest.json">
  <!-- Preload Arabic fonts for web rendering -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Cairo', 'Tajawal', sans-serif;
      direction: rtl;
      margin: 0;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #F7F5F0;
      flex-direction: column;
      gap: 16px;
    }

    #loading-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #083830, #0D4C3F);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cairo', sans-serif;
      font-size: 42px;
      font-weight: 900;
      color: white;
    }

    #loading-text {
      font-family: 'Cairo', sans-serif;
      color: #0D4C3F;
      font-size: 18px;
      font-weight: 700;
    }

    #loading-sub {
      font-family: 'Cairo', sans-serif;
      color: #8AADA5;
      font-size: 13px;
    }
  </style>

<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
